<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Viewer</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --surface2: #eaeef2;
      --surface-hover: #d8dde3;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #636c76;
      --accent: #0969da;
      --success: #1a7f37;
      --warning: #9a6700;
      --danger: #d1242f;
      --neutral: #6e7781;
      --in-progress: #0969da;
      --skeleton-shine: #dde2e6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface2: #21262d;
        --surface-hover: #30363d;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --accent: #58a6ff;
        --success: #3fb950;
        --warning: #d29922;
        --danger: #f85149;
        --neutral: #6e7681;
        --in-progress: #388bfd;
        --skeleton-shine: #2d333b;
      }
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --surface2: #eaeef2;
      --surface-hover: #d8dde3;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #636c76;
      --accent: #0969da;
      --success: #1a7f37;
      --warning: #9a6700;
      --danger: #d1242f;
      --neutral: #6e7781;
      --in-progress: #0969da;
      --skeleton-shine: #dde2e6;
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --surface-hover: #30363d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --danger: #f85149;
      --neutral: #6e7681;
      --in-progress: #388bfd;
      --skeleton-shine: #2d333b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-spacer { flex: 1; }

    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .avatar { width: 24px; height: 24px; border-radius: 50%; }

    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { background: var(--surface-hover); border-color: var(--text-muted); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-primary { background: #238636; border-color: #2ea043; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #2ea043; }

    .btn-ghost { background: transparent; border-color: transparent; }
    .btn-ghost:hover { background: var(--surface2); border-color: var(--border); }

    .btn-danger { background: transparent; border-color: transparent; color: var(--danger); }
    .btn-danger:hover { background: rgba(248, 81, 73, 0.1); border-color: var(--danger); }

    /* ── Status badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 2em;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-success    { background: rgba(63, 185, 80, 0.15);  color: var(--success); }
    .badge-failure    { background: rgba(248, 81, 73, 0.15);  color: var(--danger); }
    .badge-in-progress{ background: rgba(56, 139, 253, 0.15); color: var(--in-progress); }
    .badge-pending    { background: rgba(210, 153, 34, 0.15); color: var(--warning); }
    .badge-never      { background: rgba(110, 118, 129, 0.15);color: var(--neutral); }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-success     { background: var(--success); }
    .dot-failure     { background: var(--danger); }
    .dot-in-progress { background: var(--in-progress); animation: pulse 1.5s infinite; }
    .dot-pending     { background: var(--warning); }
    .dot-never       { background: var(--neutral); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Repo cards ── */
    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }

    .repo-card:hover { border-color: #8b949e; }

    .repo-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .repo-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
    }

    .repo-name:hover { text-decoration: underline; }

    .workflow-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .env-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .env-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      min-width: 160px;
      flex: 0 0 auto;
      transition: border-color 0.15s;
    }

    .env-item.clickable { cursor: pointer; }
    .env-item.clickable:hover { border-color: #8b949e; }

    .env-name {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .env-status { margin-bottom: 4px; }

    .env-meta { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    .env-meta code {
      background: rgba(110, 118, 129, 0.2);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      color: var(--text);
    }

    /* ── Auth screen ── */
    .auth-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 32px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .auth-title { font-size: 20px; font-weight: 600; }

    .auth-subtitle { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }

    .info-box {
      background: rgba(88, 166, 255, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.2);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    select,
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.1s, box-shadow 0.1s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    textarea { resize: vertical; line-height: 1.6; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      width: 560px;
      max-width: 100%;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* ── Repo list (modal) ── */
    .list-scroll {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      gap: 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: var(--surface2); }

    /* ── Loading skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--skeleton-shine) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Runs table ── */
    .runs-table { width: 100%; border-collapse: collapse; }

    .runs-table th {
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    .runs-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .runs-table tr:last-child td { border-bottom: none; }
    .runs-table tbody tr:hover td { background: var(--surface2); }

    /* ── Page layout ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .page-title { font-size: 20px; font-weight: 600; }

    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .breadcrumb-link { cursor: pointer; color: var(--accent); }
    .breadcrumb-link:hover { text-decoration: underline; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .empty-state p  { margin-bottom: 16px; }

    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap input { padding-left: 32px; }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      max-width: 320px;
    }

    #toast.show     { opacity: 1; transform: translateY(0); }
    #toast.is-error { border-color: var(--danger); color: var(--danger); }

    /* ── Misc ── */
    code {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<div id="toast"></div>
<div id="app"></div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────────────────────
// Persistence
// ─────────────────────────────────────────────────────────────────────────────
const Config = {
  get token()  { return localStorage.getItem('rv_token') || ''; },
  set token(v) { v ? localStorage.setItem('rv_token', v) : localStorage.removeItem('rv_token'); },

  get repos()  { return JSON.parse(localStorage.getItem('rv_repos') || '[]'); },
  set repos(v) { localStorage.setItem('rv_repos', JSON.stringify(v)); },

  get user()   { return JSON.parse(localStorage.getItem('rv_user') || 'null'); },
  set user(v)  { v ? localStorage.setItem('rv_user', JSON.stringify(v)) : localStorage.removeItem('rv_user'); },

  get baseUrl() { return localStorage.getItem('rv_base_url') || 'https://api.github.com'; },
  set baseUrl(v) {
    const url = (v || '').trim().replace(/\/+$/, '') || 'https://api.github.com';
    url === 'https://api.github.com'
      ? localStorage.removeItem('rv_base_url')
      : localStorage.setItem('rv_base_url', url);
  },

  get isGHE() { return this.baseUrl !== 'https://api.github.com'; },

  get viewMode()  { return localStorage.getItem('rv_view_mode') || 'pipeline'; },
  set viewMode(v) { localStorage.setItem('rv_view_mode', v); },

  get theme()  { return localStorage.getItem('rv_theme') || 'system'; },
  set theme(v) { v === 'system' ? localStorage.removeItem('rv_theme') : localStorage.setItem('rv_theme', v); },

  get hideEnvOnly()  { return localStorage.getItem('rv_hide_env_only') !== 'false'; },
  set hideEnvOnly(v) { localStorage.setItem('rv_hide_env_only', v ? 'true' : 'false'); },

  get favorites()  { return new Set(JSON.parse(localStorage.getItem('rv_favorites') || '[]')); },
  set favorites(v) { localStorage.setItem('rv_favorites', JSON.stringify([...v])); },

  isFavorite(rc) { return this.favorites.has(`${rc.owner}/${rc.repo}/${rc.workflowId}`); },
  toggleFavorite(rc) {
    const key = `${rc.owner}/${rc.repo}/${rc.workflowId}`;
    const favs = this.favorites;
    favs.has(key) ? favs.delete(key) : favs.add(key);
    this.favorites = favs;
  },

  get demo()  { return localStorage.getItem('rv_demo') === 'true'; },
  set demo(v) { v ? localStorage.setItem('rv_demo', 'true') : localStorage.removeItem('rv_demo'); },
};

// ─────────────────────────────────────────────────────────────────────────────
// GitHub API
// ─────────────────────────────────────────────────────────────────────────────
const GH = {
  async fetch(path, opts = {}) {
    const res = await fetch(`${Config.baseUrl}${path}`, {
      ...opts,
      headers: {
        'Authorization': `Bearer ${Config.token}`,
        'Accept': 'application/vnd.github+json',
        ...(!Config.isGHE ? { 'X-GitHub-Api-Version': '2022-11-28' } : {}),
        ...(opts.headers || {}),
      },
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const e = new Error(body.message || `HTTP ${res.status}`);
      e.status = res.status;
      throw e;
    }
    if (res.status === 204) return null;
    return res.json();
  },

  getUser()                               { return this.fetch('/user'); },
  listUserRepos(page = 1)                 { return this.fetch(`/user/repos?sort=updated&per_page=100&page=${page}&visibility=all&affiliation=owner,collaborator,organization_member`); },
  listUserOrgs()                          { return this.fetch('/user/orgs?per_page=100'); },
  listOrgRepos(org, page = 1)             { return this.fetch(`/orgs/${org}/repos?sort=updated&per_page=100&page=${page}&type=all`); },
  getWorkflows(owner, repo)               { return this.fetch(`/repos/${owner}/${repo}/actions/workflows`); },
  getWorkflowRuns(owner, repo, wfId, p)   { return this.fetch(`/repos/${owner}/${repo}/actions/workflows/${wfId}/runs?per_page=30&${new URLSearchParams(p || {})}`); },
  getAllRuns(owner, repo, p)              { return this.fetch(`/repos/${owner}/${repo}/actions/runs?per_page=20&${new URLSearchParams(p || {})}`); },
  getRunJobs(owner, repo, runId)          { return this.fetch(`/repos/${owner}/${repo}/actions/runs/${runId}/jobs?per_page=100`); },

  getEnvironments(owner, repo) {
    return this.fetch(`/repos/${owner}/${repo}/environments`).catch(e => {
      if (e.status === 404 || e.status === 403) return { environments: [] };
      throw e;
    });
  },

  getDeployments(owner, repo, env) {
    return this.fetch(`/repos/${owner}/${repo}/deployments?environment=${encodeURIComponent(env)}&per_page=5`);
  },

  getDeploymentStatuses(owner, repo, dId) {
    return this.fetch(`/repos/${owner}/${repo}/deployments/${dId}/statuses?per_page=1`);
  },
};

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function statusCls(s) {
  const m = {
    success: 'success', completed: 'success',
    failure: 'failure', failed: 'failure', error: 'failure', action_required: 'failure',
    in_progress: 'in-progress', queued: 'pending', waiting: 'pending', pending: 'pending',
    never: 'never', unknown: 'never', inactive: 'never', abandoned: 'never', skipped: 'never',
  };
  return m[(s || '').toLowerCase()] || 'never';
}

function statusLabel(s) {
  const m = {
    success: 'Success', completed: 'Success',
    failure: 'Failed', failed: 'Failed', error: 'Error', action_required: 'Action required',
    in_progress: 'Running', queued: 'Queued', waiting: 'Waiting', pending: 'Pending',
    never: 'Never deployed', unknown: 'Unknown', inactive: 'Inactive',
  };
  return m[(s || '').toLowerCase()] || (s || 'Unknown');
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(s, n) {
  s = String(s ?? '');
  return s.length > n ? s.slice(0, n) + '…' : s;
}

function applyTheme() {
  const t = Config.theme;
  if (t === 'system') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
}

function nextTheme() {
  const order = ['system', 'light', 'dark'];
  return order[(order.indexOf(Config.theme) + 1) % order.length];
}

function themeIcon(t) {

  if (t === 'dark') return `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M9.598 1.591a.749.749 0 0 1 .785-.175 7.001 7.001 0 1 1-8.967 8.967.75.75 0 0 1 .961-.96 5.5 5.5 0 0 0 7.046-7.046.75.75 0 0 1 .175-.786Zm1.616 1.945a7 7 0 0 1-7.678 7.678 5.499 5.499 0 1 0 7.678-7.678Z"/></svg>`;

// ─────────────────────────────────────────────────────────────────────────────
// Environment Detection
// ─────────────────────────────────────────────────────────────────────────────
async function detectEnvironments(owner, repo, workflowId) {
  const { environments = [] } = await GH.getEnvironments(owner, repo);
  if (environments.length) {
    return { type: 'github_environments', names: environments.map(e => e.name) };
  }

  // Fallback: scan jobs from the most recent run (only if workflowId known)
  if (!workflowId) return { type: 'github_environments', names: [] };
  try {
    const runs = (await GH.getWorkflowRuns(owner, repo, workflowId, { per_page: 2 })).workflow_runs || [];
    if (!runs.length) return { type: 'job_names', names: [] };

    const ENV_RE = /deploy|release|publish|prod|staging|stage|dev|qa|uat|canary|preview/i;
    const jobs = (await GH.getRunJobs(owner, repo, runs[0].id)).jobs || [];
    const names = [...new Set(jobs.filter(j => ENV_RE.test(j.name)).map(j => j.name))];
    return { type: 'job_names', names };
  } catch {
    return { type: 'job_names', names: [] };
  }
}

// Demo / sample data — no GitHub API

const DEMO_ENVS = ['utv', 'staging', 'preprod', 'prod'];

function buildDemoRepos() {
  const names = [
    ['acme', 'payments-api'],
    ['acme', 'web-frontend'],
    ['acme', 'auth-service'],
    ['acme', 'notification-worker'],
    ['acme', 'billing-gateway'],
    ['acme', 'search-svc'],
  ];
  const refs = ['main', 'release/2.4.0', 'main', 'hotfix/login', 'main', 'release/1.9.2'];
  const users = ['alice', 'bob', 'carol', 'dave'];
  const hex = () => Math.floor(Math.random() * 16).toString(16);
  const sha = () => Array.from({ length: 7 }, hex).join('');

  return names.map(([owner, repo], i) => {
    const statuses = {};
    DEMO_ENVS.forEach((env, idx) => {
      // Mix: earlier envs fail more, prod mostly green. Guarantee a spread.
      const seed = (i * 4 + idx);
      const status = (seed % 3 === 1) ? 'failure' : 'success';
      const minsAgo = (seed * 37) % 4000 + 5;
      statuses[env] = {
        env,
        status,
        sha: sha(),
        ref: refs[i % refs.length],
        creator: users[(i + idx) % users.length],
        createdAt: new Date(Date.now() - minsAgo * 60000).toISOString(),
        runUrl: '',
        runId: String(1000 + seed),
      };
    });
    return {
      owner, repo,
      workflowId: 'deploy.yml',
      workflowName: 'Deploy',
      envType: 'github_environments',
      environments: [...DEMO_ENVS],
      demo: true,
      _statuses: statuses,
      _ts: Date.now() - (i * 3600000),
    };
  });
}

function loadDemoData() {
  Config.demo  = true;
  Config.repos = buildDemoRepos();
  Config.user  = { login: 'demo-user', avatar_url: '' };

// ─────────────────────────────────────────────────────────────────────────────
async function fetchEnvStatuses(rc) {
  if (rc.demo) return rc._statuses;
  const { owner, repo, workflowId, envType, environments } = rc;
  const result = {};

  if (envType === 'github_environments') {
    await Promise.all(environments.map(async envName => {
      try {
        const deployments = await GH.getDeployments(owner, repo, envName);
        if (!deployments.length) { result[envName] = { status: 'never', env: envName }; return; }
        const latest = deployments[0];
        const statuses = await GH.getDeploymentStatuses(owner, repo, latest.id);
        const s = statuses[0];
        const targetUrl = s?.target_url || '';
        const runIdMatch = targetUrl.match(/\/runs\/(\d+)/);
        result[envName] = {
          env: envName,
          status: s?.state || 'unknown',
          sha: latest.sha?.slice(0, 7),
          ref: latest.ref,
          creator: latest.creator?.login,
          createdAt: latest.updated_at || latest.created_at,
          runUrl: targetUrl || latest.url,
          runId: runIdMatch ? runIdMatch[1] : null,
        };
      } catch {
        result[envName] = { status: 'unknown', env: envName };
      }
    }));
  } else {
    // Job-based: scan runs to find last success per job name
    const found = {};
    const needed = new Set(environments);

    try {
      const runs = (await GH.getWorkflowRuns(owner, repo, workflowId, { per_page: 30 })).workflow_runs || [];

      for (const run of runs) {
        if (!needed.size) break;
        try {
          const jobs = (await GH.getRunJobs(owner, repo, run.id)).jobs || [];
          for (const envName of [...needed]) {
            const job = jobs.find(j => j.name === envName && j.conclusion === 'success');
            if (job) {
              found[envName] = {
                env: envName,
                status: 'success',
                sha: run.head_sha?.slice(0, 7),
                ref: run.head_branch,
                creator: run.actor?.login,
                createdAt: run.created_at,
                runUrl: run.html_url,
                runId: String(run.run_number || run.id),
              };
              needed.delete(envName);
            }
          }
        } catch { /* skip */ }
      }
    } catch { /* network */ }

    for (const envName of needed) found[envName] = { env: envName, status: 'never' };
    Object.assign(result, found);
  }

  return result;
}

async function fetchLatestTs(rc) {
  if (rc.demo) return rc._ts;
  const { owner, repo, workflowId, envType, environments } = rc;
  try {
    if (workflowId) {
      const data = await GH.getWorkflowRuns(owner, repo, workflowId, { per_page: 1 });
      const run  = (data.workflow_runs || [])[0];
      if (run) return new Date(run.created_at).getTime();
    }
    if (envType === 'github_environments' && environments.length) {
      const deps = await GH.getDeployments(owner, repo, environments[0]);
      if (deps.length) return new Date(deps[0].updated_at || deps[0].created_at).getTime();
    }
  } catch { /* fall through */ }
  return 0;
}

  dropdown.style.cssText = `
    position:absolute;top:calc(100% + 6px);right:0;
    background:var(--surface);border:1px solid var(--border);
    border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.2);
    min-width:160px;z-index:200;overflow:hidden;display:none;
  `;

  function makeMenuItem(label, icon, danger, onClick) {
    const item = document.createElement('button');
    item.style.cssText = `width:100%;text-align:left;padding:8px 12px;background:transparent;border:none;cursor:pointer;font-size:13px;color:${danger ? 'var(--danger)' : 'var(--text)'};font-family:inherit;display:flex;align-items:center;gap:8px`;
    item.innerHTML = `${icon} ${label}`;
    const hoverBg = danger ? 'rgba(248,81,73,0.1)' : 'var(--surface2)';
    item.addEventListener('mouseenter', () => item.style.background = hoverBg);
    item.addEventListener('mouseleave', () => item.style.background = 'transparent');
    item.addEventListener('click', () => { dropdown.style.display = 'none'; open = false; onClick(); });
    return item;
  }

  dropdown.append(makeMenuItem('Load sample data', `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>`, false, () => {
    if (Config.repos.length && !Config.demo && !confirm('Replace current pipelines with demo sample data?')) return;
    loadDemoData();
  }));

  if (repos.length) {
    dropdown.append(makeMenuItem('Refresh all', `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"/></svg>`, false, () => renderCards()));

    const envOnlyItem = makeMenuItem(
      'Hide environment-only repos',
      `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/><path d="M1.38 8a7.002 7.002 0 0 1 13.243 0 7.002 7.002 0 0 1-13.244 0ZM8 3a5.5 5.5 0 1 0 0 11A5.5 5.5 0 0 0 8 3Z"/></svg>`,
      false,
      () => { Config.hideEnvOnly = !Config.hideEnvOnly; checkEl.innerHTML = Config.hideEnvOnly ? checkIcon : ''; renderCards(); }
    );
    const checkIcon = `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>`;
    const checkEl = document.createElement('span');
    checkEl.style.cssText = 'margin-left:auto;color:var(--accent)';
    checkEl.innerHTML = Config.hideEnvOnly ? checkIcon : '';
    envOnlyItem.append(checkEl);
    dropdown.append(envOnlyItem);

    const divider = document.createElement('div');
    divider.style.cssText = 'height:1px;background:var(--border);margin:4px 0';
    dropdown.append(divider);

    dropdown.append(makeMenuItem('Remove all pipelines', `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.576l-.66-6.6a.75.75 0 1 1 1.492-.149Z"/></svg>`, true, () => {
      if (!confirm(`Remove all ${repos.length} pipeline${repos.length > 1 ? 's' : ''}?`)) return;
      Config.repos = [];
      render();
    }));
  }

  btnGroup.append(dropdown);

  let open = false;
  moreBtn.addEventListener('click', e => {
    e.stopPropagation();
    open = !open;
    dropdown.style.display = open ? 'block' : 'none';
  });

  document.addEventListener('click', function close() {
    dropdown.style.display = 'none';
    open = false;
    document.removeEventListener('click', close);
  });

  hdr.append(btnGroup);
  wrap.append(hdr);

  if (!repos.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <svg width="32" height="32" viewBox="0 0 16 16" fill="var(--text-muted)" style="margin-bottom:12px"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/></svg>
      <h3>No pipelines tracked</h3>
      <p>Add a GitHub Actions workflow to start monitoring deployments.</p>
    `;
    const btn2 = document.createElement('button');
    btn2.className = 'btn btn-primary';
    btn2.textContent = '+ Add Pipeline';
    btn2.addEventListener('click', () => { State.modal = 'add-repo'; render(); });
    empty.append(btn2);
    wrap.append(empty);
    return wrap;
  }

  // ── Toolbar: search + sort ──
  const toolbar = document.createElement('div');
  toolbar.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap';

  const searchWrap = document.createElement('div');
  searchWrap.className = 'search-wrap';
  searchWrap.style.cssText = 'flex:1;min-width:180px;margin-bottom:0';
  searchWrap.innerHTML = `
    <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
    <input type="text" id="dash-search" placeholder="Filter pipelines…" autocomplete="off" />
  `;

  const sortGroup = document.createElement('div');
  sortGroup.style.cssText = 'display:flex;gap:0;flex-shrink:0';
  sortGroup.innerHTML = `
    <button class="btn sort-btn" data-sort="alpha" style="border-radius:6px 0 0 6px;border-right:none">A–Z</button>
    <button class="btn sort-btn" data-sort="latest" style="border-radius:0 6px 6px 0">Latest run</button>
  `;

  const viewGroup = document.createElement('div');
  viewGroup.style.cssText = 'display:flex;gap:0;flex-shrink:0';
  viewGroup.innerHTML = `
    <button class="btn view-btn" data-view="pipeline" title="One card per pipeline" style="border-radius:6px 0 0 6px;border-right:none">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v3.5A1.75 1.75 0 0 1 14.25 7H1.75A1.75 1.75 0 0 1 0 5.25Zm1.75-.25a.25.25 0 0 0-.25.25v3.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25v-3.5a.25.25 0 0 0-.25-.25Zm-1.75 8C0 8.784.784 8 1.75 8h12.5c.966 0 1.75.784 1.75 1.75v3.5A1.75 1.75 0 0 1 14.25 15H1.75A1.75 1.75 0 0 1 0 13.25Zm1.75-.25a.25.25 0 0 0-.25.25v3.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25v-3.5a.25.25 0 0 0-.25-.25Z"/></svg>
      Pipeline
    </button>
    <button class="btn view-btn" data-view="repo" title="Group pipelines by repository" style="border-radius:0 6px 6px 0">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/></svg>
      Repo
    </button>
  `;

  const favFilterBtn = document.createElement('button');
  favFilterBtn.className = 'btn';
  favFilterBtn.title = 'Show favorites only';
  favFilterBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.694Z"/></svg>`;

  toolbar.append(searchWrap, favFilterBtn, sortGroup, viewGroup);
  wrap.append(toolbar);

  const cardsWrap = document.createElement('div');
  wrap.append(cardsWrap);

  let currentSort  = 'alpha';
  let currentQ     = '';
  let currentView  = Config.viewMode;
  let tsCache      = {};
  let sortLoading  = false;
  let favOnly      = false;

  function updateFavFilterBtn() {
    favFilterBtn.style.background  = favOnly ? 'var(--accent)' : '';
    favFilterBtn.style.borderColor = favOnly ? 'var(--accent)' : '';
    favFilterBtn.style.color       = favOnly ? '#fff' : '';
  }
  favFilterBtn.addEventListener('click', () => { favOnly = !favOnly; updateFavFilterBtn(); renderCards(); });

  function sortedRepos(list) {
    const favScore = rc => Config.isFavorite(rc) ? 0 : 1;
    if (currentSort === 'alpha') {
      return [...list].sort((a, b) =>
        favScore(a) - favScore(b) ||
        `${a.owner}/${a.repo}`.localeCompare(`${b.owner}/${b.repo}`));
    }
    return [...list].sort((a, b) =>
      favScore(a) - favScore(b) ||
      (tsCache[`${b.owner}/${b.repo}`] || 0) - (tsCache[`${a.owner}/${a.repo}`] || 0));
  }

  function renderCards() {
    const filtered = repos.filter(r => {
      if (Config.hideEnvOnly && r.workflowId === null && !r.environments?.length) return false;
      if (favOnly && !Config.isFavorite(r)) return false;
      if (currentQ) return `${r.owner}/${r.repo}`.toLowerCase().includes(currentQ) ||
        (r.workflowName || '').toLowerCase().includes(currentQ);
      return true;
    });
    const sorted = sortedRepos(filtered);
    cardsWrap.innerHTML = '';
    if (!sorted.length) {
      cardsWrap.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--text-muted);font-size:13px">No pipelines match "${esc(currentQ)}"</div>`;
      return;
    }

    if (currentView === 'repo') {
      // Group by owner/repo
      const groups = new Map();
      for (const rc of sorted) {
        const key = `${rc.owner}/${rc.repo}`;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(rc);
      }
      for (const [, pipelines] of groups) {
        cardsWrap.append(renderRepoGroup(pipelines));
      }
    } else {
      for (const rc of sorted) cardsWrap.append(renderRepoCard(rc));
    }
  }

  function updateSortButtons() {
    sortGroup.querySelectorAll('.sort-btn').forEach(b => {
      const active = b.dataset.sort === currentSort;
      b.style.background  = active ? 'var(--accent)' : '';
      b.style.borderColor = active ? 'var(--accent)' : '';
      b.style.color       = active ? '#fff' : '';
    });
  }

  function updateViewButtons() {
    viewGroup.querySelectorAll('.view-btn').forEach(b => {
      const active = b.dataset.view === currentView;
      b.style.background  = active ? 'var(--accent)' : '';
      b.style.borderColor = active ? 'var(--accent)' : '';
      b.style.color       = active ? '#fff' : '';
    });
  }

  async function activateLatestSort() {
    if (sortLoading) return;
    sortLoading = true;
    const latestBtn = sortGroup.querySelector('[data-sort="latest"]');
    latestBtn.textContent = 'Loading…';
    latestBtn.disabled = true;

    await Promise.all(repos.map(async rc => {
      const key = `${rc.owner}/${rc.repo}`;
      if (!(key in tsCache)) tsCache[key] = await fetchLatestTs(rc);
    }));

    latestBtn.textContent = 'Latest run';
    latestBtn.disabled    = false;
    sortLoading = false;
    renderCards();
  }

  sortGroup.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      currentSort = btn.dataset.sort;
      updateSortButtons();
      if (currentSort === 'latest') await activateLatestSort();
      else renderCards();
    });
  });

  viewGroup.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentView = btn.dataset.view;
      Config.viewMode = currentView;
      updateViewButtons();
      renderCards();
    });
  });

  let timer;
  searchWrap.querySelector('#dash-search').addEventListener('input', e => {
    clearTimeout(timer);
    currentQ = e.target.value.toLowerCase().trim();
    timer = setTimeout(renderCards, 150);
  });

  updateSortButtons();
  updateViewButtons();
  renderCards();
  return wrap;
}

// ─────────────────────────────────────────────────────────────────────────────
// Repo Card
// ─────────────────────────────────────────────────────────────────────────────
function renderRepoCard(rc) {
  const card = document.createElement('div');
  card.className = 'repo-card';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'repo-card-header';

  const nameEl = document.createElement('span');
  nameEl.className = 'repo-name';
  nameEl.textContent = `${rc.owner}/${rc.repo}`;
  nameEl.addEventListener('click', () => goDetail(rc));

  const wfTag = document.createElement('span');
  wfTag.className = 'workflow-tag';
  wfTag.textContent = rc.workflowName || (rc.workflowId ? String(rc.workflowId) : 'Environments only');

  const spacer = document.createElement('div');
  spacer.style.flex = '1';

  const starBtn = document.createElement('button');
  starBtn.className = 'btn';
  starBtn.style.cssText = 'font-size:12px;padding:3px 6px;line-height:1';
  starBtn.title = 'Toggle favorite';
  function updateStar() {
    const fav = Config.isFavorite(rc);
    starBtn.innerHTML = fav
      ? `<svg width="13" height="13" viewBox="0 0 16 16" fill="var(--accent)"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>`
      : `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.694Z"/></svg>`;
    starBtn.style.color = fav ? 'var(--accent)' : '';
  }
  updateStar();
  starBtn.addEventListener('click', () => { Config.toggleFavorite(rc); updateStar(); });

  const refreshBtn = document.createElement('button');
  refreshBtn.className = 'btn';
  refreshBtn.style.cssText = 'font-size:12px;padding:3px 8px';
  refreshBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"/></svg> Refresh`;

  const removeBtn = document.createElement('button');
  removeBtn.className = 'btn btn-danger';
  removeBtn.style.cssText = 'font-size:12px;padding:3px 8px';
  removeBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.576l-.66-6.6a.75.75 0 1 1 1.492-.149Z"/></svg>`;

  hdr.append(nameEl, wfTag, spacer, starBtn, refreshBtn, removeBtn);

  // Env grid with skeletons
  const envGrid = document.createElement('div');
  envGrid.className = 'env-grid';
  putSkeletons(envGrid, rc.environments?.length || 2);

  card.append(hdr, envGrid);

  function refresh() {
    putSkeletons(envGrid, rc.environments?.length || 2);
    loadEnvGrid(rc, envGrid);
  }

  refreshBtn.addEventListener('click', refresh);

  removeBtn.addEventListener('click', () => {
    if (!confirm(`Remove ${rc.owner}/${rc.repo}?`)) return;
    Config.repos = Config.repos.filter(r => !(r.owner === rc.owner && r.repo === rc.repo && r.workflowId === rc.workflowId));
    render();
  });

  loadEnvGrid(rc, envGrid);
  return card;
}

// ─────────────────────────────────────────────────────────────────────────────
// Repo Group Card (by-repo view)
// ─────────────────────────────────────────────────────────────────────────────
function renderRepoGroup(pipelines) {
  const { owner, repo } = pipelines[0];
  const card = document.createElement('div');
  card.className = 'repo-card';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'repo-card-header';
  hdr.style.marginBottom = '0';

  const nameEl = document.createElement('span');
  nameEl.className = 'repo-name';
  nameEl.textContent = `${owner}/${repo}`;
  nameEl.addEventListener('click', () => goDetail(pipelines[0]));

  const countTag = document.createElement('span');
  countTag.className = 'workflow-tag';
  countTag.textContent = `${pipelines.length} pipeline${pipelines.length > 1 ? 's' : ''}`;

  const spacer = document.createElement('div');
  spacer.style.flex = '1';

  const groupStarBtn = document.createElement('button');
  groupStarBtn.className = 'btn';
  groupStarBtn.style.cssText = 'font-size:12px;padding:3px 6px;line-height:1';
  groupStarBtn.title = 'Toggle favorite';
  function updateGroupStar() {
    const fav = pipelines.some(rc => Config.isFavorite(rc));
    groupStarBtn.innerHTML = fav
      ? `<svg width="13" height="13" viewBox="0 0 16 16" fill="var(--accent)"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/></svg>`
      : `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Zm0 2.445L6.615 5.5a.75.75 0 0 1-.564.41l-3.097.45 2.24 2.184a.75.75 0 0 1 .216.664l-.528 3.084 2.769-1.456a.75.75 0 0 1 .698 0l2.77 1.456-.53-3.084a.75.75 0 0 1 .216-.664l2.24-2.183-3.096-.45a.75.75 0 0 1-.564-.41L8 2.694Z"/></svg>`;
    groupStarBtn.style.color = fav ? 'var(--accent)' : '';
  }
  updateGroupStar();
  groupStarBtn.addEventListener('click', () => {
    const fav = pipelines.some(rc => Config.isFavorite(rc));
    pipelines.forEach(rc => {
      const key = `${rc.owner}/${rc.repo}/${rc.workflowId}`;
      const favs = Config.favorites;
      fav ? favs.delete(key) : favs.add(key);
      Config.favorites = favs;
    });
    updateGroupStar();
  });

  const refreshAllBtn = document.createElement('button');
  refreshAllBtn.className = 'btn';
  refreshAllBtn.style.cssText = 'font-size:12px;padding:3px 8px';
  refreshAllBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z"/></svg> Refresh all`;

  hdr.append(nameEl, countTag, spacer, groupStarBtn, refreshAllBtn);
  card.append(hdr);

  const pipelinesWrap = document.createElement('div');

  function buildPipelineSections() {
    pipelinesWrap.innerHTML = '';
    for (const rc of pipelines) {
      const section = document.createElement('div');
      section.style.cssText = 'margin-top:14px;padding-top:14px;border-top:1px solid var(--border)';

      const sectionHdr = document.createElement('div');
      sectionHdr.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px';

      const wfTag = document.createElement('span');
      wfTag.className = 'workflow-tag';
      wfTag.style.cursor = 'pointer';
      wfTag.textContent = rc.workflowName || (rc.workflowId ? String(rc.workflowId) : 'Environments only');
      wfTag.addEventListener('click', () => goDetail(rc));

      const removePipelineBtn = document.createElement('button');
      removePipelineBtn.className = 'btn btn-danger';
      removePipelineBtn.style.cssText = 'font-size:11px;padding:2px 6px;margin-left:auto';
      removePipelineBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.576l-.66-6.6a.75.75 0 1 1 1.492-.149Z"/></svg>`;
      removePipelineBtn.addEventListener('click', () => {
        if (!confirm(`Remove pipeline "${rc.workflowName || rc.workflowId || 'Environments only'}" from ${owner}/${repo}?`)) return;
        Config.repos = Config.repos.filter(r => !(r.owner === rc.owner && r.repo === rc.repo && r.workflowId === rc.workflowId));
        render();
      });

      sectionHdr.append(wfTag, removePipelineBtn);

      const envGrid = document.createElement('div');
      envGrid.className = 'env-grid';
      putSkeletons(envGrid, rc.environments?.length || 2);
      loadEnvGrid(rc, envGrid);

      section.append(sectionHdr, envGrid);
      pipelinesWrap.append(section);
    }
  }

  refreshAllBtn.addEventListener('click', () => {
    buildPipelineSections();
  });

  card.append(pipelinesWrap);
  buildPipelineSections();
  return card;
}

function putSkeletons(container, count) {
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    container.insertAdjacentHTML('beforeend', `
      <div class="env-item">
        <div class="skeleton" style="height:11px;width:55px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:20px;width:80px;margin-bottom:6px"></div>
        <div class="skeleton" style="height:11px;width:110px"></div>
      </div>
    `);
  }
}

async function loadEnvGrid(rc, container) {
  try {
    const statuses = await fetchEnvStatuses(rc);
    container.innerHTML = '';
    for (const envName of rc.environments) {
      container.append(renderEnvItem(statuses[envName] || { env: envName, status: 'never' }));
    }
  } catch (e) {
    container.innerHTML = `<div style="color:var(--danger);font-size:13px;padding:4px">Failed to load: ${esc(e.message)}</div>`;
  }
}

function renderEnvItem(s) {
  const sc   = statusCls(s.status);
  const item = document.createElement('div');
  item.className = 'env-item' + (s.runUrl ? ' clickable' : '');

  item.innerHTML = `
    <div class="env-name">${esc(s.env)}</div>
    <div class="env-status">
      <span class="badge badge-${sc}">
        <span class="status-dot dot-${sc}"></span>
        ${statusLabel(s.status)}
      </span>
    </div>
    <div class="env-meta">
      ${s.sha ? `<code>${esc(s.sha)}</code> ` : ''}${s.ref ? `<span title="${esc(s.ref)}">${esc(trunc(s.ref, 22))}</span>` : ''}
      ${s.runId ? ` <span style="color:var(--text-muted)">·</span> ${s.runUrl ? `<a href="${esc(s.runUrl)}" target="_blank" style="font-size:11px;font-family:monospace">#${esc(s.runId)}</a>` : `<code>#${esc(s.runId)}</code>`}` : ''}
      ${s.createdAt ? `<br><span>${timeAgo(s.createdAt)}</span>` : ''}${s.creator ? ` · ${esc(s.creator)}` : ''}
    </div>
  `;

  if (s.runUrl) item.addEventListener('click', () => window.open(s.runUrl, '_blank'));
  return item;
}

// ─────────────────────────────────────────────────────────────────────────────
// Add Pipeline Modal (3 steps)
// ─────────────────────────────────────────────────────────────────────────────
function renderAddRepoModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.innerHTML = `<div class="modal-title">Add Pipeline</div>`;

  const body = document.createElement('div');
  modal.append(body);
  overlay.append(modal);

  if (Config.demo) {
    body.innerHTML = `
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
        Demo mode — adds a sample repo with environments
        <code>utv</code> <code>staging</code> <code>preprod</code> <code>prod</code> and randomized statuses.
      </p>
      <div class="form-group">
        <label for="demo-owner">Owner</label>
        <input type="text" id="demo-owner" value="acme" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="demo-repo">Repository name</label>
        <input type="text" id="demo-repo" placeholder="my-service" autocomplete="off" />
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn" id="demo-cancel" style="flex:1;justify-content:center">Cancel</button>
        <button class="btn btn-primary" id="demo-add" style="flex:2;justify-content:center">Add repo</button>
      </div>
    `;
    body.querySelector('#demo-cancel').addEventListener('click', closeModal);
    const repoInput = body.querySelector('#demo-repo');
    repoInput.focus();
    function addDemo() {
      const owner = body.querySelector('#demo-owner').value.trim() || 'acme';
      const repo  = repoInput.value.trim();
      if (!repo) { toast('Enter a repository name', true); return; }
      if (Config.repos.some(r => r.owner === owner && r.repo === repo)) {
        toast('Already tracked', true); return;
      }
      Config.repos = [...Config.repos, makeDemoRepo(owner, repo)];
      closeModal();
      toast(`Added ${owner}/${repo}`);
    }
    body.querySelector('#demo-add').addEventListener('click', addDemo);
    repoInput.addEventListener('keydown', e => { if (e.key === 'Enter') addDemo(); });
    return overlay;
  }

  let allRepos = [];

  // ── Step 1: pick repo(s) ──
  function step1() {
    const selected = new Set();

    body.innerHTML = `
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <div class="search-wrap" style="flex:1;margin-bottom:0">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/></svg>
          <input type="text" id="repo-search" placeholder="Search repositories…" autocomplete="off" />
        </div>
        <select id="org-filter" class="btn" style="flex-shrink:0;max-width:160px;cursor:pointer">
          <option value="">All owners</option>
        </select>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 2px;margin-bottom:4px">
        <button id="select-all-btn" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--accent);padding:0;font-family:inherit">Select all</button>
        <span id="visible-count" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
      <div class="list-scroll" id="repo-list" style="min-height:60px">
        <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">Loading…</div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn" id="cancel-s1" style="flex:1;justify-content:center">Cancel</button>
        <button class="btn" id="configure-btn" style="flex:1;justify-content:center" disabled>Configure →</button>
        <button class="btn btn-primary" id="bulk-add-btn" style="flex:2;justify-content:center" disabled>Add selected (0)</button>
      </div>
    `;

    const searchInput   = body.querySelector('#repo-search');
    const orgFilter     = body.querySelector('#org-filter');
    const listEl        = body.querySelector('#repo-list');
    const configureBtn  = body.querySelector('#configure-btn');
    const bulkAddBtn    = body.querySelector('#bulk-add-btn');
    const selectAllBtn  = body.querySelector('#select-all-btn');
    const visibleCount  = body.querySelector('#visible-count');
    let visibleRepos = [];
    let timer;

    const ownerOf = r => (r.owner?.login) || r.full_name.split('/')[0];
    function getFiltered() {
      const q = searchInput.value.toLowerCase().trim();
      const org = orgFilter.value;
      return allRepos.filter(r =>
        (!org || ownerOf(r) === org) &&
        (!q || r.full_name.toLowerCase().includes(q)));
    }

    body.querySelector('#cancel-s1').addEventListener('click', closeModal);

    function updateButtons() {
      const n = selected.size;
      bulkAddBtn.disabled    = n === 0;
      bulkAddBtn.textContent = n <= 1 ? `Add selected (${n})` : `Auto-add ${n} repos`;
      configureBtn.disabled  = n !== 1;
      const allVisible = visibleRepos.length > 0 && visibleRepos.every(r => selected.has(r.full_name));
      selectAllBtn.textContent = allVisible ? 'Deselect all' : 'Select all';
      visibleCount.textContent = visibleRepos.length ? `${visibleRepos.length} repo${visibleRepos.length > 1 ? 's' : ''}` : '';
    }

    selectAllBtn.addEventListener('click', () => {
      const allVisible = visibleRepos.every(r => selected.has(r.full_name));
      if (allVisible) visibleRepos.forEach(r => selected.delete(r.full_name));
      else            visibleRepos.forEach(r => selected.add(r.full_name));
      renderList(getFiltered());
      updateButtons();
    });

    function renderList(repos) {
      visibleRepos = repos.slice(0, 50);
      if (!repos.length) {
        listEl.innerHTML = `<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">No repositories found</div>`;
        updateButtons();
        return;
      }
      listEl.innerHTML = '';
      for (const r of visibleRepos) {
        const already = Config.repos.some(cr => cr.owner + '/' + cr.repo === r.full_name);
        const item = document.createElement('div');
        item.className = 'list-item';
        item.dataset.name = r.full_name;
        const checked = selected.has(r.full_name);
        item.innerHTML = `
          <span class="s1-check" style="
            display:inline-flex;align-items:center;justify-content:center;
            width:16px;height:16px;border-radius:3px;flex-shrink:0;
            border:1.5px solid ${checked ? 'var(--accent)' : 'var(--border)'};
            background:${checked ? 'var(--accent)' : 'transparent'};
            transition:background 0.1s,border-color 0.1s;">
            ${checked ? `<svg width="10" height="10" viewBox="0 0 16 16" fill="#fff"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>` : ''}
          </span>
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--text-muted)" style="flex-shrink:0"><path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Zm10.5-1h-8a1 1 0 0 0-1 1v6.708A2.486 2.486 0 0 1 4.5 9h8Z"/></svg>
          <span style="flex:1;font-size:13px;${already ? 'color:var(--text-muted)' : ''}">${esc(r.full_name)}${already ? ' <span style="font-size:11px">(tracked)</span>' : ''}</span>
          ${r.private ? `<span style="font-size:11px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px">private</span>` : ''}
        `;
        item.addEventListener('click', () => {
          if (selected.has(r.full_name)) selected.delete(r.full_name);
          else selected.add(r.full_name);
          renderList(getFiltered());
          updateButtons();
        });
        listEl.append(item);
      }
      updateButtons();
    }

    async function load() {
      try {
        const userRepos = await GH.listUserRepos();
        const seen = new Set(userRepos.map(r => r.full_name));

        if (Config.isGHE) {
          const orgs = await GH.listUserOrgs().catch(() => []);
          const orgRepoLists = await Promise.all(
            orgs.map(o => GH.listOrgRepos(o.login).catch(() => []))
          );
          for (const r of orgRepoLists.flat()) {
            if (!seen.has(r.full_name)) { seen.add(r.full_name); userRepos.push(r); }
          }
        }

        allRepos = userRepos;
        const owners = [...new Set(allRepos.map(ownerOf))].sort((a, b) => a.localeCompare(b));
        for (const o of owners) {
          const opt = document.createElement('option');
          opt.value = o; opt.textContent = o;
          orgFilter.append(opt);
        }
        renderList(getFiltered());
      } catch (e) {
        listEl.innerHTML = `<div style="padding:16px;color:var(--danger);font-size:13px">${esc(e.message)}</div>`;
      }
    }

    searchInput.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => renderList(getFiltered()), 180);
    });

    orgFilter.addEventListener('change', () => renderList(getFiltered()));

    configureBtn.addEventListener('click', () => {
      const name = [...selected][0];
      const repo = allRepos.find(r => r.full_name === name);
      if (repo) step2(repo);
    });

    bulkAddBtn.addEventListener('click', () => {
      const repos = [...selected].map(name => allRepos.find(r => r.full_name === name)).filter(Boolean);
      if (repos.length === 1) step2(repos[0]);
      else stepBulkAdd(repos);
    });

    updateButtons();
    load();
  }

  // ── Bulk auto-add ──
  async function stepBulkAdd(repos) {
    body.innerHTML = `
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">
        Auto-detecting workflows and environments for <strong style="color:var(--text)">${repos.length} repos</strong>…
      </p>
      <div id="bulk-list" style="display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto"></div>
      <div style="margin-top:12px">
        <button class="btn" id="bulk-done-btn" style="width:100%;justify-content:center" disabled>Done</button>
      </div>
    `;

    const bulkList = body.querySelector('#bulk-list');
    const doneBtn  = body.querySelector('#bulk-done-btn');

    const rows = {};
    for (const r of repos) {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:13px';
      row.innerHTML = `
        <span class="status-dot dot-pending" style="flex-shrink:0"></span>
        <span style="flex:1">${esc(r.full_name)}</span>
        <span class="bulk-status" style="font-size:12px;color:var(--text-muted)">Pending…</span>
      `;
      rows[r.full_name] = row;
      bulkList.append(row);
    }

    let added = 0;

    for (const r of repos) {
      const row    = rows[r.full_name];
      const dot    = row.querySelector('.status-dot');
      const status = row.querySelector('.bulk-status');

      dot.className = 'status-dot dot-in-progress';
      status.textContent = 'Detecting…';

      const [owner, repoName] = r.full_name.split('/');

      try {
        if (Config.repos.some(cr => cr.owner === owner && cr.repo === repoName)) {
          dot.className = 'status-dot dot-never';
          status.style.color = 'var(--neutral)';
          status.textContent = 'Already tracked';
          continue;
        }

        const { workflows = [] } = await GH.getWorkflows(owner, repoName).catch(() => ({ workflows: [] }));
        const wf = workflows.find(w => w.state === 'active') || null;
        const detected = await detectEnvironments(owner, repoName, wf?.id ?? null);

        Config.repos = [...Config.repos, {
          owner,
          repo: repoName,
          workflowId:   wf?.id   ?? null,
          workflowName: wf?.name ?? null,
          envType:      detected.type,
          environments: detected.names,
        }];

        added++;
        dot.className = 'status-dot dot-success';
        status.style.color = 'var(--success)';
        const envCount = detected.names.length;
        status.textContent = envCount
          ? `Added · ${envCount} env${envCount > 1 ? 's' : ''}`
          : 'Added · no envs detected';
      } catch (e) {
        dot.className = 'status-dot dot-failure';
        status.style.color = 'var(--danger)';
        status.textContent = `Error: ${e.message}`;
      }
    }

    doneBtn.disabled = false;
    doneBtn.textContent = added ? `Done — added ${added} pipeline${added > 1 ? 's' : ''}` : 'Done';
    doneBtn.addEventListener('click', () => { closeModal(); });
  }

  // ── Step 2: pick workflow ──
  async function step2(repo) {
    const [owner, repoName] = repo.full_name.split('/');

    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:13px;color:var(--text-muted)">
        <span class="breadcrumb-link" id="back-s1">← Repositories</span>
        <span>/</span>
        <strong style="color:var(--text)">${esc(repo.full_name)}</strong>
      </div>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:10px">Select a workflow:</p>
      <div class="list-scroll" id="wf-list" style="min-height:60px">
        <div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px">Loading…</div>
      </div>
      <div style="margin-top:12px">
        <button class="btn" id="cancel-s2" style="width:100%;justify-content:center">Cancel</button>
      </div>
    `;

    body.querySelector('#back-s1').addEventListener('click', step1);
    body.querySelector('#cancel-s2').addEventListener('click', closeModal);

    const wfList = body.querySelector('#wf-list');

    try {
      const { workflows = [] } = await GH.getWorkflows(owner, repoName);

      if (!workflows.length) {
        wfList.innerHTML = '';
        const noWf = document.createElement('div');
        noWf.innerHTML = `
          <div style="padding:16px;color:var(--text-muted);font-size:13px;text-align:center;border-bottom:1px solid var(--border)">
            No workflows found in this repository.
          </div>
        `;
        const envOnly = document.createElement('div');
        envOnly.className = 'list-item';
        envOnly.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--accent)"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/></svg>
          <div style="flex:1">
            <div style="font-size:13px;color:var(--accent)">Use GitHub Environments only</div>
            <div style="font-size:11px;color:var(--text-muted)">Track deployments via the Deployments API — no workflow required</div>
          </div>
        `;
        envOnly.addEventListener('click', () => step3(repo, null));
        wfList.append(noWf, envOnly);
        return;
      }

      wfList.innerHTML = '';
      for (const wf of workflows) {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 16 16" fill="var(--text-muted)"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Z"/></svg>
          <div style="flex:1">
            <div style="font-size:13px">${esc(wf.name)}</div>
            <div style="font-size:11px;color:var(--text-muted)">${esc(wf.path)}</div>
          </div>
          <span class="badge ${wf.state === 'active' ? 'badge-success' : 'badge-never'}" style="font-size:11px">${esc(wf.state)}</span>
        `;
        item.addEventListener('click', () => step3(repo, wf));
        wfList.append(item);
      }
    } catch (e) {
      wfList.innerHTML = `<div style="padding:16px;color:var(--danger);font-size:13px">${esc(e.message)}</div>`;
    }
  }

  // ── Step 3: configure environments ──
  async function step3(repo, workflow) {
    const [owner, repoName] = repo.full_name.split('/');
    const noWorkflow = !workflow;

    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;font-size:13px;color:var(--text-muted)">
        <span class="breadcrumb-link" id="back-s2">← Workflows</span>
        <span>/</span>
        <strong style="color:var(--text)">${noWorkflow ? 'GitHub Environments' : esc(workflow.name)}</strong>
      </div>
      <div id="env-config">
        <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">Detecting environments…</div>
      </div>
    `;

    body.querySelector('#back-s2').addEventListener('click', () => step2(repo));

    const envCfg = body.querySelector('#env-config');

    try {
      const detected = noWorkflow
        ? await detectEnvironments(owner, repoName, null)
        : await detectEnvironments(owner, repoName, workflow.id);

      const forceGithubEnv = noWorkflow;

      envCfg.innerHTML = `
        <div class="form-group">
          <label>Environment source</label>
          <select id="env-type" ${forceGithubEnv ? 'disabled' : ''}>
            <option value="github_environments" ${(forceGithubEnv || detected.type === 'github_environments') ? 'selected' : ''}>GitHub Environments (Deployments API)</option>
            ${!forceGithubEnv ? `<option value="job_names" ${detected.type === 'job_names' ? 'selected' : ''}>Workflow Job Names</option>` : ''}
          </select>
          ${forceGithubEnv ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">No workflow selected — using GitHub Environments (Deployments API).</div>` : `
          <div style="font-size:12px;color:var(--text-muted);margin-top:4px">
            Use <em>GitHub Environments</em> if your repo has Environments configured in Settings.
            Use <em>Job Names</em> if environments are represented as job steps.
          </div>`}
        </div>
        <div class="form-group">
          <label>Environments <span style="color:var(--text-muted);font-weight:400">(one per line)</span></label>
          <textarea id="env-names" rows="5" placeholder="production&#10;staging&#10;development">${esc(detected.names.join('\n'))}</textarea>
          <div style="font-size:12px;margin-top:4px;${detected.names.length ? 'color:var(--success)' : 'color:var(--warning)'}">
            ${detected.names.length
              ? `✓ Auto-detected ${detected.names.length} environment${detected.names.length > 1 ? 's' : ''}`
              : 'No environments auto-detected — enter them manually above.'}
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn" id="cancel-s3" style="flex:1;justify-content:center">Cancel</button>
          <button class="btn btn-primary" id="add-btn" style="flex:2;justify-content:center">Add Pipeline</button>
        </div>
      `;

      envCfg.querySelector('#cancel-s3').addEventListener('click', closeModal);
      envCfg.querySelector('#add-btn').addEventListener('click', () => {
        const envType  = forceGithubEnv ? 'github_environments' : envCfg.querySelector('#env-type').value;
        const envNames = envCfg.querySelector('#env-names').value
          .split('\n').map(s => s.trim()).filter(Boolean);

        if (!envNames.length) { toast('Add at least one environment', true); return; }

        const wfId = workflow?.id ?? null;
        if (Config.repos.some(r => r.owner === owner && r.repo === repoName && r.workflowId === wfId)) {
          toast('Pipeline already tracked', true);
          return;
        }

        Config.repos = [...Config.repos, {
          owner,
          repo: repoName,
          workflowId: wfId,
          workflowName: workflow?.name ?? null,
          envType,
          environments: envNames,
        }];

        toast(`Added ${owner}/${repoName}`);
        closeModal();
      });
    } catch (e) {
      envCfg.innerHTML = `<div style="color:var(--danger);font-size:13px">${esc(e.message)}</div>`;
    }
  }

  step1();
  return overlay;
}

function closeModal() {
  State.modal = null;
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// Detail View
// ─────────────────────────────────────────────────────────────────────────────
function goDetail(rc) {
  State.view = 'detail';
  State.detailRepo = rc;
  render();
  loadDetail(rc);
}

function renderDetail(rc) {
  const { owner, repo, workflowId, workflowName, environments } = rc;
  const wrap = document.createElement('div');

  // Breadcrumb
  wrap.insertAdjacentHTML('beforeend', `
    <div class="breadcrumb">
      <span class="breadcrumb-link" id="bc-home">Deployments</span>
      <span>/</span>
      <span>${esc(owner)}/<strong>${esc(repo)}</strong></span>
    </div>
  `);
  wrap.querySelector('#bc-home').addEventListener('click', () => {
    State.view = 'dashboard';
    State.detailRepo = null;
    render();
  });

  // Title
  const hdr = document.createElement('div');
  hdr.className = 'page-header';
  hdr.innerHTML = `
    <div>
      <h2 class="page-title">${esc(owner)}/${esc(repo)}</h2>
      <div style="color:var(--text-muted);font-size:13px;margin-top:4px">Workflow: ${esc(workflowName || String(workflowId))}</div>
    </div>
    <a class="btn" href="${esc(ghWebBase())}/${esc(owner)}/${esc(repo)}/actions" target="_blank">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M3.75 2h3.5a.75.75 0 0 1 0 1.5h-3.5a.25.25 0 0 0-.25.25v8.5c0 .138.112.25.25.25h8.5a.25.25 0 0 0 .25-.25v-3.5a.75.75 0 0 1 1.5 0v3.5A1.75 1.75 0 0 1 12.25 14h-8.5A1.75 1.75 0 0 1 2 12.25v-8.5C2 2.784 2.784 2 3.75 2Zm6.854-1h4.146a.25.25 0 0 1 .25.25v4.146a.25.25 0 0 1-.427.177L13.03 4.03 9.28 7.78a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042l3.75-3.75-1.543-1.543A.25.25 0 0 1 10.604 1Z"/></svg>
      Open in GitHub
    </a>
  `;
  wrap.append(hdr);

  // Current deployments panel
  const statusCard = document.createElement('div');
  statusCard.className = 'card';
  statusCard.innerHTML = `<div class="card-label">Current Deployments</div>`;
  const envGrid = document.createElement('div');
  envGrid.id = 'detail-env-grid';
  envGrid.className = 'env-grid';
  putSkeletons(envGrid, environments.length);
  statusCard.append(envGrid);
  wrap.append(statusCard);

  // Recent runs panel
  const runsCard = document.createElement('div');
  runsCard.className = 'card';
  runsCard.innerHTML = `
    <div class="card-label">Recent Runs</div>
    <div id="runs-list" style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">Loading…</div>
  `;
  wrap.append(runsCard);

  return wrap;
}

async function loadDetail(rc) {
  const { owner, repo, workflowId, environments } = rc;

  // Env statuses
  const envGrid = document.getElementById('detail-env-grid');
  if (envGrid) {
    try {
      const statuses = await fetchEnvStatuses(rc);
      envGrid.innerHTML = '';
      for (const envName of environments) {
        envGrid.append(renderEnvItem(statuses[envName] || { env: envName, status: 'never' }));
      }
    } catch (e) {
      if (envGrid) envGrid.innerHTML = `<div style="color:var(--danger);font-size:13px">Error: ${esc(e.message)}</div>`;
    }
  }

  // Recent runs
  const runsList = document.getElementById('runs-list');
  if (!runsList) return;

  if (rc.demo) { renderDemoRuns(rc, runsList); return; }

  if (!workflowId) {
    runsList.textContent = 'No workflow configured — tracking via GitHub Environments only.';
    return;
  }

  try {
    const data = await GH.getWorkflowRuns(owner, repo, workflowId, { per_page: 20 });
    const runs = data.workflow_runs || [];

    if (!runs.length) {
      runsList.textContent = 'No runs found.';
      return;
    }

    const table = document.createElement('table');
    table.className = 'runs-table';
    table.innerHTML = `
      <thead><tr>
        <th>Run</th>
        <th>Branch</th>
        <th>Commit</th>
        <th>Status</th>
        <th>Environments</th>
        <th>Actor</th>
        <th>Time</th>
      </tr></thead>
    `;

    const tbody = document.createElement('tbody');

    // Load job data in parallel for all runs (to show per-env status)
    const jobsMap = {};
    await Promise.all(runs.map(async run => {
      try {
        const j = await GH.getRunJobs(owner, repo, run.id);
        jobsMap[run.id] = j.jobs || [];
      } catch { jobsMap[run.id] = []; }
    }));

    for (const run of runs) {
      const sc   = statusCls(run.conclusion || run.status);
      const jobs = jobsMap[run.id] || [];

      // Build per-env badges from jobs that match tracked envs
      const envBadges = environments.map(envName => {
        const job = jobs.find(j => j.name === envName);
        if (!job) return '';
        const jsc = statusCls(job.conclusion || job.status);
        return `<span class="badge badge-${jsc}" style="font-size:11px;margin-right:3px"><span class="status-dot dot-${jsc}"></span>${esc(envName)}</span>`;
      }).filter(Boolean).join('');

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <a href="${esc(run.html_url)}" target="_blank" style="font-family:monospace;font-size:12px">#${run.run_number}</a>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(trunc(run.display_title || run.name || '', 42))}</div>
        </td>
        <td><code style="font-size:12px;background:rgba(110,118,129,0.2);padding:1px 5px;border-radius:3px">${esc(run.head_branch || '')}</code></td>
        <td>${run.head_sha
          ? `<a href="${esc(ghWebBase())}/${esc(owner)}/${esc(repo)}/commit/${esc(run.head_sha)}" target="_blank" style="font-family:monospace;font-size:12px">${esc(run.head_sha.slice(0, 7))}</a>`
          : ''}</td>
        <td><span class="badge badge-${sc}"><span class="status-dot dot-${sc}"></span>${statusLabel(run.conclusion || run.status)}</span></td>
        <td style="max-width:260px">${envBadges || '<span style="color:var(--neutral);font-size:12px">—</span>'}</td>
        <td style="font-size:13px;color:var(--text-muted)">${esc(run.actor?.login || '')}</td>
        <td style="font-size:12px;color:var(--text-muted)" title="${esc(run.created_at)}">${timeAgo(run.created_at)}</td>
      `;
      tbody.append(tr);
    }

    table.append(tbody);
    runsList.innerHTML = '';
    runsList.append(table);
  } catch (e) {
    if (runsList) runsList.innerHTML = `<span style="color:var(--danger)">Error: ${esc(e.message)}</span>`;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Boot
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  applyTheme();
  if (Config.token && !Config.user) {
    try { Config.user = await GH.getUser(); }
    catch { Config.token = ''; }
  }
  render();
}

init();
</script>
</body>
</html>
